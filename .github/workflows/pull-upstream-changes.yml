name: Pull upstream changes

on:
  schedule:
    - cron: '0 2 * * *'  # daily at 2am UTC
  # allow manual triggering
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/apache/airflow.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout upstream-main
          # Because upstream-main tracks the upstream main branch, we don't need merge commits.
          # Fail if the merge cannot be fast-forwarded.
          git merge --ff-only upstream/main

      - name: Push changes
        run: git push origin upstream-main
